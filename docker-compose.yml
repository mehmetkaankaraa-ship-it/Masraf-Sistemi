version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: attorney_ledger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: attorney
      POSTGRES_PASSWORD: attorney_pass
      POSTGRES_DB: attorney_ledger
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
